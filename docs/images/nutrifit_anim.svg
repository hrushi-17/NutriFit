<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E50914; stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0" />
    </linearGradient>
    <linearGradient id="wave-grad-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E50914; stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0" />
    </linearGradient>
    <linearGradient id="wave-grad-3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E50914; stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#000000" />

  <!-- Background Waves -->
  <g>
    <path d="M0 140 C150 110 300 170 450 140 C600 110 750 170 900 140 L900 250 L0 250 Z" fill="url(#wave-grad-3)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M450 140 C600 110 750 170 900 140 C1050 110 1200 170 1350 140 L1350 250 L450 250 Z" fill="url(#wave-grad-3)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="20s" repeatCount="indefinite" />
    </path>
  </g>

  <g>
    <path d="M0 160 C150 130 300 190 450 160 C600 130 750 190 900 160 L900 250 L0 250 Z" fill="url(#wave-grad-2)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="15s" repeatCount="indefinite" />
    </path>
    <path d="M450 160 C600 130 750 190 900 160 C1050 130 1200 190 1350 160 L1350 250 L450 250 Z" fill="url(#wave-grad-2)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="15s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Floating Letters "NUTRIFIT" -->
  <g filter="url(#glow)" font-family="system-ui, sans-serif" font-weight="900" font-size="70" fill="#E50914" text-anchor="middle">
    <!-- N -->
    <text x="140" y="130">N
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="0s" />
    </text>
    <!-- U -->
    <text x="210" y="130">U
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="0.3s" />
    </text>
    <!-- T -->
    <text x="280" y="130">T
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="0.6s" />
    </text>
    <!-- R -->
    <text x="350" y="130">R
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="0.9s" />
    </text>
    <!-- I -->
    <text x="420" y="130">I
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="1.2s" />
    </text>
    <!-- F -->
    <text x="490" y="130">F
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="1.5s" />
    </text>
    <!-- I -->
    <text x="560" y="130">I
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="1.8s" />
    </text>
    <!-- T -->
    <text x="630" y="130">T
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="3s" repeatCount="indefinite" begin="2.1s" />
    </text>
  </g>

  <!-- Foreground Waves -->
  <g>
    <path d="M0 180 C150 160 300 210 450 180 C600 160 750 210 900 180 L900 250 L0 250 Z" fill="url(#wave-grad-1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="10s" repeatCount="indefinite" />
    </path>
    <path d="M450 180 C600 160 750 210 900 180 C1050 160 1200 210 1350 180 L1350 250 L450 250 Z" fill="url(#wave-grad-1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="10s" repeatCount="indefinite" />
    </path>
  </g>

  <g>
    <path d="M0 200 C150 190 300 220 450 200 C600 180 750 210 900 200 L900 250 L0 250 Z" fill="rgba(0,0,0,0.7)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="8s" repeatCount="indefinite" />
    </path>
    <path d="M450 200 C600 190 750 220 900 200 C1050 180 1200 210 1350 200 L1350 250 L450 250 Z" fill="rgba(0,0,0,0.7)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-450 0" dur="8s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
