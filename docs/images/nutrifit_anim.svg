<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-white">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Seamless Wave Pattern -->
    <path id="wave-path" d="M0 0 Q100 -30 200 0 T400 0 T800 0 T1200 0 V100 H0 Z" />
  </defs>

  <rect width="800" height="250" fill="#000000" />

  <!-- Back Sea Layer (Slowest Scroll) -->
  <g transform="translate(0, 140)">
    <g fill="#8B0000" opacity="0.2">
      <use href="#wave-path" x="0" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="20s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Middle Sea Layer -->
  <g transform="translate(0, 160)">
    <g fill="#E50914" opacity="0.3">
      <use href="#wave-path" x="0" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="12s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Floating Letters "NUTRIFIT" (Independent Boat-like Floating) -->
  <g font-family="system-ui, sans-serif" font-weight="900" font-size="75" text-anchor="middle" letter-spacing="8px">
    <!-- N (Red) -->
    <g filter="url(#glow-red)" fill="#E50914">
      <text x="120" y="140">N</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" values="-2 120 140; 2 120 140; -2 120 140" dur="8s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- U (Red) -->
    <g filter="url(#glow-red)" fill="#E50914">
      <text x="195" y="140">U</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="0.4s" />
      <animateTransform attributeName="transform" type="rotate" values="2 195 140; -2 195 140; 2 195 140" dur="8.4s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- T (Red) -->
    <g filter="url(#glow-red)" fill="#E50914">
      <text x="270" y="140">T</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="0.8s" />
      <animateTransform attributeName="transform" type="rotate" values="-1 270 140; 1 270 140; -1 270 140" dur="7.2s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- R (Red) -->
    <g filter="url(#glow-red)" fill="#E50914">
      <text x="345" y="140">R</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="1.2s" />
      <animateTransform attributeName="transform" type="rotate" values="3 345 140; -3 345 140; 3 345 140" dur="9s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- I (Red) -->
    <g filter="url(#glow-red)" fill="#E50914">
      <text x="420" y="140">I</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="1.6s" />
      <animateTransform attributeName="transform" type="rotate" values="-2 420 140; 2 420 140; -2 420 140" dur="7.5s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- F (WHITE) -->
    <g filter="url(#glow-white)" fill="#FFFFFF">
      <text x="505" y="140">F</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="2s" />
      <animateTransform attributeName="transform" type="rotate" values="2 505 140; -2 505 140; 2 505 140" dur="8.2s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- I (WHITE) -->
    <g filter="url(#glow-white)" fill="#FFFFFF">
      <text x="580" y="140">I</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="2.4s" />
      <animateTransform attributeName="transform" type="rotate" values="-1 580 140; 1 580 140; -1 580 140" dur="7.8s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- T (WHITE) -->
    <g filter="url(#glow-white)" fill="#FFFFFF">
      <text x="655" y="140">T</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="4s" repeatCount="indefinite" begin="2.8s" />
      <animateTransform attributeName="transform" type="rotate" values="3 655 140; -3 655 140; 3 655 140" dur="8.6s" repeatCount="indefinite" additive="sum" />
    </g>
  </g>

  <!-- Front Sea Layer (Fastest Scroll) -->
  <g transform="translate(0, 180)">
    <g fill="#E50914" opacity="0.65">
      <use href="#wave-path" x="0" />
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-400 0" dur="8s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- Bottom Sea Depth (Static Overlay) -->
  <rect y="210" width="800" height="40" fill="rgba(0,0,0,0.7)" />
</svg>
