<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    @keyframes wave { 0% { d: path('M0 100 Q150 50 300 100 T600 100 V150 H0 Z'); } 50% { d: path('M0 100 Q150 150 300 100 T600 100 V150 H0 Z'); } 100% { d: path('M0 100 Q150 50 300 100 T600 100 V150 H0 Z'); } }
    .floating { animation: float 3s ease-in-out infinite; fill: #E50914; font-family: 'Inter', sans-serif; font-weight: 800; font-size: 60px; text-anchor: middle; letter-spacing: 5px; }
    .wave { animation: wave 5s ease-in-out infinite; fill: rgba(229, 9, 20, 0.3); }
    .subtitle { animation: float 3s ease-in-out infinite alternate; fill: #ffffff; font-family: sans-serif; font-size: 18px; text-anchor: middle; opacity: 0.8; }
  </style>
  <rect width="100%" height="150" fill="#000000" />
  <path class="wave" d="M0 100 Q150 50 300 100 T600 100 V150 H0 Z" />
  <text x="300" y="80" class="floating">NUTRIFIT</text>
  <text x="300" y="115" class="subtitle">Premium Full-Stack Fitness</text>
</svg>
