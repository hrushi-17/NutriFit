<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wave-grad-back-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E50914; stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0" />
    </linearGradient>
    <linearGradient id="wave-grad-back-2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E50914; stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0" />
    </linearGradient>
    <linearGradient id="wave-grad-front-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E50914; stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E50914" stop-opacity="0" />
      <stop offset="50%" stop-color="#E50914" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#E50914" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="300" fill="#000000" />

  <!-- Background Waves (4 layers) -->
  <g>
    <path d="M0 160 C200 130 400 190 600 160 C800 130 1000 190 1200 160 V300 H0 Z" fill="url(#wave-grad-back-1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="25s" repeatCount="indefinite" />
    </path>
    <path d="M600 160 C800 130 1000 190 1200 160 C1400 130 1600 190 1800 160 V300 H600 Z" fill="url(#wave-grad-back-1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="25s" repeatCount="indefinite" />
    </path>
  </g>

  <g>
    <path d="M0 180 C200 150 400 210 600 180 C800 150 1000 210 1200 180 V300 H0 Z" fill="url(#wave-grad-back-2)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M600 180 C800 150 1000 210 1200 180 C1400 150 1600 210 1800 180 V300 H600 Z" fill="url(#wave-grad-back-2)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="20s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Moving Shimmer -->
  <rect x="0" y="150" width="1600" height="150" fill="url(#shimmer-grad)">
    <animateTransform attributeName="transform" type="translate" from="-800 0" to="800 0" dur="12s" repeatCount="indefinite" />
  </rect>

  <!-- Floating Letters "NUTRIFIT" (Dual-axis animation) -->
  <g filter="url(#glow)" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="80" fill="#E50914" text-anchor="middle">
    <!-- N -->
    <g transform="translate(140, 150)">
      <text x="0" y="0">N
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="0s" />
        <animateTransform attributeName="transform" type="rotate" values="-2 0 0; 2 0 0; -2 0 0" dur="7s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- U -->
    <g transform="translate(215, 150)">
      <text x="0" y="0">U
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="0.4s" />
        <animateTransform attributeName="transform" type="rotate" values="2 0 0; -2 0 0; 2 0 0" dur="7.4s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- T -->
    <g transform="translate(290, 150)">
      <text x="0" y="0">T
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="0.8s" />
        <animateTransform attributeName="transform" type="rotate" values="-1 0 0; 1 0 0; -1 0 0" dur="6s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- R -->
    <g transform="translate(365, 150)">
      <text x="0" y="0">R
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="1.2s" />
        <animateTransform attributeName="transform" type="rotate" values="3 0 0; -3 0 0; 3 0 0" dur="8s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- I -->
    <g transform="translate(440, 150)">
      <text x="0" y="0">I
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="1.6s" />
        <animateTransform attributeName="transform" type="rotate" values="-2 0 0; 2 0 0; -2 0 0" dur="6.5s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- F -->
    <g transform="translate(515, 150)">
      <text x="0" y="0">F
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="2.0s" />
        <animateTransform attributeName="transform" type="rotate" values="2 0 0; -2 0 0; 2 0 0" dur="7.2s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- I -->
    <g transform="translate(590, 150)">
      <text x="0" y="0">I
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="2.4s" />
        <animateTransform attributeName="transform" type="rotate" values="-1 0 0; 1 0 0; -1 0 0" dur="6.8s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
    <!-- T -->
    <g transform="translate(665, 150)">
      <text x="0" y="0">T
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -20; 0 0" dur="3.5s" repeatCount="indefinite" begin="2.8s" />
        <animateTransform attributeName="transform" type="rotate" values="3 0 0; -3 0 0; 3 0 0" dur="7.6s" repeatCount="indefinite" additive="sum" />
      </text>
    </g>
  </g>

  <!-- Foreground Waves (4 layers) -->
  <g>
    <path d="M0 210 C200 190 400 230 600 210 C800 190 1000 230 1200 210 V300 H0 Z" fill="url(#wave-grad-front-1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="12s" repeatCount="indefinite" />
    </path>
    <path d="M600 210 C800 190 1000 230 1200 210 C1400 190 1600 230 1800 210 V300 H600 Z" fill="url(#wave-grad-front-1)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="12s" repeatCount="indefinite" />
    </path>
  </g>

  <g>
    <path d="M0 230 C200 215 400 245 600 230 C800 215 1000 245 1200 230 V300 H0 Z" fill="rgba(229, 9, 20, 0.4)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="9s" repeatCount="indefinite" />
    </path>
    <path d="M600 230 C800 215 1000 245 1200 230 C1400 215 1600 245 1800 230 V300 H600 Z" fill="rgba(229, 9, 20, 0.4)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="9s" repeatCount="indefinite" />
    </path>
  </g>

  <g>
    <path d="M0 250 C200 240 400 260 600 250 C800 240 1000 260 1200 250 V300 H0 Z" fill="rgba(0,0,0,0.8)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="7s" repeatCount="indefinite" />
    </path>
    <path d="M600 250 C800 240 1000 260 1200 250 C1400 240 1600 260 1800 250 V300 H600 Z" fill="rgba(0,0,0,0.8)">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-600 0" dur="7s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
