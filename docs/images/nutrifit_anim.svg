<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Netflix Background -->
  <rect width="800" height="200" fill="#000000" />

  <!-- Back Wave (Deeper Red, Morphing) -->
  <path fill="#8B0000" opacity="0.4">
    <animate attributeName="d" 
      dur="7s" 
      repeatCount="indefinite"
      values="M0 120 Q200 80 400 120 T800 120 V250 H0 Z;
              M0 120 Q200 160 400 120 T800 120 V250 H0 Z;
              M0 120 Q200 80 400 120 T800 120 V250 H0 Z" />
  </path>

  <!-- NUTRIFIT Logo (Sleek, Floating) -->
  <text x="400" y="110" filter="url(#glow)" font-family="system-ui, sans-serif" font-weight="900" font-size="75" fill="#E50914" text-anchor="middle" letter-spacing="10px">
    NUTRIFIT
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="4s" repeatCount="indefinite" />
  </text>

  <!-- Front Wave (Vibrant Netflix Red, Morphing) -->
  <path fill="#E50914" opacity="0.6">
    <animate attributeName="d" 
      dur="5s" 
      repeatCount="indefinite"
      values="M0 160 Q200 120 400 160 T800 160 V250 H0 Z;
              M0 160 Q200 190 400 160 T800 160 V250 H0 Z;
              M0 160 Q200 120 400 160 T800 160 V250 H0 Z" />
  </path>

  <!-- Bottom Dark Overlay (for depth) -->
  <rect y="180" width="800" height="20" fill="rgba(0,0,0,0.5)" />
</svg>
