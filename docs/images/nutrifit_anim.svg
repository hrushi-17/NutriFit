<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="250" fill="#000000" />

  <!-- Back Liquid Wave -->
  <path fill="#8B0000" opacity="0.4">
    <animate attributeName="d" 
      dur="8s" 
      repeatCount="indefinite"
      values="M0 130 Q200 90 400 130 T800 130 V250 H0 Z;
              M0 130 Q200 170 400 130 T800 130 V250 H0 Z;
              M0 130 Q200 90 400 130 T800 130 V250 H0 Z" />
  </path>

  <!-- Floating Letters "NUTRIFIT" (Independent Boat-like Floating) -->
  <g filter="url(#glow)" font-family="system-ui, sans-serif" font-weight="900" font-size="70" fill="#E50914" text-anchor="middle">
    <!-- N -->
    <g>
      <text x="140" y="140">N</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="0s" />
      <animateTransform attributeName="transform" type="rotate" values="-2 140 140; 2 140 140; -2 140 140" dur="8s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- U -->
    <g>
      <text x="215" y="140">U</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="0.4s" />
      <animateTransform attributeName="transform" type="rotate" values="2 215 140; -2 215 140; 2 215 140" dur="8.4s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- T -->
    <g>
      <text x="290" y="140">T</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="0.8s" />
      <animateTransform attributeName="transform" type="rotate" values="-1 290 140; 1 290 140; -1 290 140" dur="7s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- R -->
    <g>
      <text x="365" y="140">R</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="1.2s" />
      <animateTransform attributeName="transform" type="rotate" values="3 365 140; -3 365 140; 3 365 140" dur="9s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- I -->
    <g>
      <text x="440" y="140">I</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="1.6s" />
      <animateTransform attributeName="transform" type="rotate" values="-2 440 140; 2 440 140; -2 440 140" dur="7.5s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- F -->
    <g>
      <text x="515" y="140">F</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="2s" />
      <animateTransform attributeName="transform" type="rotate" values="2 515 140; -2 515 140; 2 515 140" dur="8.2s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- I -->
    <g>
      <text x="590" y="140">I</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="2.4s" />
      <animateTransform attributeName="transform" type="rotate" values="-1 590 140; 1 590 140; -1 590 140" dur="7.8s" repeatCount="indefinite" additive="sum" />
    </g>
    <!-- T -->
    <g>
      <text x="665" y="140">T</text>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="4s" repeatCount="indefinite" begin="2.8s" />
      <animateTransform attributeName="transform" type="rotate" values="3 665 140; -3 665 140; 3 665 140" dur="8.6s" repeatCount="indefinite" additive="sum" />
    </g>
  </g>

  <!-- Front Liquid Wave (Vibrant Red) -->
  <path fill="#E50914" opacity="0.6">
    <animate attributeName="d" 
      dur="6s" 
      repeatCount="indefinite"
      values="M0 170 Q200 130 400 170 T800 170 V250 H0 Z;
              M0 170 Q200 200 400 170 T800 170 V250 H0 Z;
              M0 170 Q200 130 400 170 T800 170 V250 H0 Z" />
  </path>

  <!-- Bottom Dark Overlay -->
  <rect y="210" width="800" height="40" fill="rgba(0,0,0,0.6)" />
</svg>
