<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-400px); }
    }
    @keyframes float {
      0% { transform: translateY(0px) rotate(-1deg); }
      50% { transform: translateY(-15px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(-1deg); }
    }
    .wave-group {
      animation: wave 10s linear infinite;
    }
    .wave-group-fast {
      animation: wave 7s linear infinite;
    }
    .wave-group-slow {
      animation: wave 15s linear infinite;
    }
    .floating-text {
      animation: float 4s ease-in-out infinite;
      fill: #E50914;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 72px;
      text-anchor: middle;
      filter: drop-shadow(0 0 10px rgba(229, 9, 20, 0.4));
      letter-spacing: 8px;
    }
    .sea-layer-1 { fill: rgba(229, 9, 20, 0.1); }
    .sea-layer-2 { fill: rgba(229, 9, 20, 0.2); }
    .sea-layer-3 { fill: rgba(229, 9, 20, 0.3); }
    .sea-layer-4 { fill: rgba(0, 0, 0, 0.8); }
  </style>
  
  <rect width="800" height="200" fill="#000000" />
  
  <!-- Sea Layer 1 (Back) -->
  <g class="wave-group-slow">
    <path d="M0 120 C100 100 300 150 400 120 C500 90 700 140 800 120 L800 200 L0 200 Z" class="sea-layer-1" />
    <path d="M800 120 C900 100 1100 150 1200 120 C1300 90 1500 140 1600 120 L1600 200 L800 200 Z" class="sea-layer-1" />
  </g>
  
  <!-- Sea Layer 2 -->
  <g class="wave-group">
    <path d="M0 140 C100 120 300 170 400 140 C500 110 700 160 800 140 L800 200 L0 200 Z" class="sea-layer-2" />
    <path d="M800 140 C900 120 1100 170 1200 140 C1300 110 1500 160 1600 140 L1600 200 L800 200 Z" class="sea-layer-2" />
  </g>
  
  <!-- Floating Logo -->
  <text x="400" y="100" class="floating-text">NUTRIFIT</text>
  
  <!-- Sea Layer 3 -->
  <g class="wave-group-fast">
    <path d="M0 160 C100 140 300 190 400 160 C500 130 700 180 800 160 L800 200 L0 200 Z" class="sea-layer-3" />
    <path d="M800 160 C900 140 1100 190 1200 160 C1300 130 1500 180 1600 160 L1600 200 L800 200 Z" class="sea-layer-3" />
  </g>
  
  <!-- Sea Layer 4 (Front) -->
  <g class="wave-group">
    <path d="M0 180 C100 170 300 200 400 180 C500 160 700 190 800 180 L800 200 L0 200 Z" class="sea-layer-4" />
    <path d="M800 180 C900 170 1100 200 1200 180 C1300 160 1500 190 1600 180 L1600 200 L800 200 Z" class="sea-layer-4" />
  </g>
</svg>
